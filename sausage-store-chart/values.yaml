global:
  imagePullPolicy: Always
  ###vault:
  ###  host: ip
  ###  name: vault
  ###  vaultToken: someToken


frontend:
### В чарте frontend отсутствуют некоторые важные файлы. Поймите какие и опишите их.
  replicas: 1
  revisionHistoryLimit: 15
  strategy:
    type: Recreate
  service:
    port: 80
  ingress:
    host: front-romariotrain.2sem.students-projects.ru
    path: /
    pathType: Prefix
    tlsSecret: 2sem-students-projects-wildcard-secret
  containerPort: 80
  image: romariotrain/sausage-frontend:latest
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "128Mi"
      cpu: "1"
  nginxConf: nginx.conf

backend:
  annotations:
    path: /actuator/prometheus
    port: "8080"
    scrape: "true"
  env:
    postgresUri: jdbc:postgresql://postgresql:5432/sausage-store
    postgresUser: store
    postgresPassword: storepassword
    reportPath: /logs/reports
    logPath: /logs
  service:
    port: 8080
  revisionHistoryLimit: 15
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  image: romariotrain/sausage-backend:latest
  imagePullPolicy: Always
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "1"
  containerPort: 8080
  livenessProbe:
    httpGet:
      path: /actuator/health
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 3
  vpa:
    # Режим "Off" = VPA только считает рекомендации, но НЕ применяет их автоматически
    updatePolicy:
      updateMode: "Off"
    resourcePolicy:
      containerPolicies:
        - containerName: '*'
          controlledResources: ["cpu", "memory"]

backend-report:
  replicas: 1
  revisionHistoryLimit: 15
  strategy:
    type: Recreate
  image: romariotrain/sausage-backend-report:latest
  containerPort: 8080
  service:
    port: 8080
  env:
    # PORT -> ConfigMap (несекретное)
    PORT: "8080"
    # DB -> Secret (содержит логин/пароль к mongodb).
    # Берём root-учётку mongodb из infra.mongodb.env, authSource=admin.
    DB: mongodb://root:rootpassword@mongodb:27017/sausage-store?authSource=admin
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "500m"
  hpa:
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

infra:
  postgresql:
    image: postgres:15
    containerPort: 5432
    storage: 1Gi
    env:
      POSTGRES_DB: sausage-store
      POSTGRES_USER: store
      POSTGRES_PASSWORD: storepassword
      # Postgres хранит данные в подпапке тома, чтобы initdb не спотыкался о lost+found
      PGDATA: /var/lib/postgresql/data/pgdata
  mongodb:
    env:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    containerPort: 27017
