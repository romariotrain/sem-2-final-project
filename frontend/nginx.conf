worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # nginx-у нужны временные папки, а от пользователя nginx доступен /tmp:
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    sendfile on;

    server {
        listen 8080;                # совпадает с EXPOSE 8080 в Dockerfile
        server_name _;

        location /momo-store/ {
            alias /usr/share/nginx/html/momo-store/;
            try_files $uri $uri/ /momo-store/index.html;   # для Angular-роутинга
        }
    }
}