name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: r-devops-magistracy-project-2sem-251290862
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

jobs:
  # Сборка и пуш образов в докерхаб:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          # Получение исходного кода из репозитория:
          uses: actions/checkout@v3
        - name: Set up Docker Buildx
          # Установка сборщика контейнеров Docker:
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker 
          # Авторизация на Docker Hub:
          uses: docker/login-action@v2
          # При помощи with передаём в action параметры username и password:
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}
            # Хорошо ли держать логин и пароль прямо в коде workflow?
            # Нет, это нехорошо. Хранить пароль надо в Secrets.
        - name: Push Backend to DockerHub
          # Одновременный билд и пуш образа в Docker Hub:
          uses: docker/build-push-action@v4
          with:
            # Параметр context: ./backend/ указывает, что нужный Dockerfile 
            # находится в ./backend/
            context: ./backend/
            # Параметр push: true указывает, что образ нужно не только собрать,
            # но и отправить на Docker Hub:
            push: true
            # В параметре tags задаётся название и тег для образа.
            # Для каждого пересобранного образа 
            # устанавливаем тег latest, чтобы потом
            # на сервере и в docker-compose.yml не указывать версию образа:
            tags: romariotrain/sausage-backend:latest
            build-args: |
              VERSION=${{ github.sha }}
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: romariotrain/sausage-frontend:latest
        - name: Push Backend-report to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend-report/
            push: true
            tags: romariotrain/sausage-backend-report:latest
  # Упаковываем helm-чарт и пушим его в Nexus
  add_helm_chart_to_nexus:
      name: Add Helm Chart To Nexus
      runs-on: ubuntu-latest
      needs: build_and_push_to_docker_hub

      steps:
        - name: Check out the repo
          uses: actions/checkout@v3

        - name: Install Helm
          uses: azure/setup-helm@v4
          with:
            version: v3.16.4

        # Упаковываем чарт в архив sausage-store-<version>.tgz
        - name: Package Helm chart
          run: helm package ./sausage-store-chart

        # Загружаем архив в Hosted Helm репозиторий Nexus
        - name: Push chart to Nexus
          run: |
            CHART=$(ls sausage-store-*.tgz)
            curl -u "$NEXUS_HELM_REPO_USER:$NEXUS_HELM_REPO_PASSWORD" \
              --upload-file "$CHART" \
              "$NEXUS_HELM_REPO/$CHART"

  # Деплоим приложения в кластер Kubernetes с помощью helm-чарт
  deploy_helm_chart_to_kubernetes:
      name: Deploy Helm Chart To Kubernetes
      runs-on: ubuntu-latest
      needs: add_helm_chart_to_nexus

      steps:
        - name: Install Helm
          uses: azure/setup-helm@v4
          with:
            version: v3.16.4

        # 1. Подключаем helm-репозиторий Nexus
        - name: Add Nexus Helm repo
          run: |
            helm repo add nexus "$NEXUS_HELM_REPO" --username "$NEXUS_HELM_REPO_USER" --password "$NEXUS_HELM_REPO_PASSWORD"
            helm repo update

        # 2. Готовим kubeconfig из секрета.
        #    Поддерживаем оба формата секрета: base64 ИЛИ сырой kubeconfig.
        - name: Configure kubeconfig
          run: |
            mkdir -p "$HOME/.kube"
            if echo "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config" 2>/dev/null \
               && grep -q "apiVersion" "$HOME/.kube/config"; then
              echo "kubeconfig: декодирован из base64"
            else
              echo "$KUBE_CONFIG" > "$HOME/.kube/config"
              echo "kubeconfig: использован как сырой текст"
            fi
            chmod 600 "$HOME/.kube/config"

        # 3. Деплоим чарт из Nexus в свой namespace
        - name: Deploy with Helm
          run: |
            helm upgrade --install sausage-store nexus/sausage-store \
              --namespace "$SAUSAGE_STORE_NAMESPACE" \
              --history-max 3 \
              --wait --timeout 10m